<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Selected Work — Zachary Halvorson</title>
  <meta name="description" content="Password-protected case studies by Zachary Halvorson, product designer at Meta Reality Labs.">
  <meta name="author" content="Zachary Halvorson">
  <meta name="robots" content="noindex, nofollow">
  <link rel="canonical" href="https://www.zacharyhalvorson.com/work/">

  <!-- Match the page background so Safari's own toolbar tints to blend. -->
  <meta name="theme-color" content="#fafaf7" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1c1b19" media="(prefers-color-scheme: dark)">

  <link rel="apple-touch-icon-precomposed" href="../apple-touch-icon.png">
  <link rel="shortcut icon" type="image/x-icon" href="../favicon.ico">

  <style>
    /* ----------------------------------------------------------------
       Selected Work — a tabbed reader for the case-study exports.
       Self-contained (no shared stylesheet) so it stays portable, but
       the palette and font stack are lifted from the main site
       (style.css) so it reads as one brand.

       Two layers:
         1. A soft password gate (#gate) shown until the visitor enters
            the passphrase. Client-side only — a deterrent, not real
            security — so the underlying case-study files are never
            fetched until the gate is cleared.
         2. A Safari-style tab strip (#chrome) over a stack of <iframe>s,
            one per case study. Each case study is added by dropping its
            export into work/<slug>/ and adding one line to the
            CASES manifest in the script below.
       ---------------------------------------------------------------- */

    :root {
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      --font-mono: ui-monospace, "SF Mono", "Cascadia Mono", Menlo, Consolas, monospace;

      --text-default: #2a2a2a;
      --text-soft: #565656;
      --text-light: #817e7e;
      --base: #fafaf7;
      --surface: #ffffff;
      --rule: rgba(0, 0, 0, 0.08);
      --highlight: #fff3d6;
      --highlight-deep: #f3e5b8;
      /* Green siblings of the warm highlights — same soft, muted weight,
         used for the "correct passphrase" success state. -green mirrors
         --highlight (soft, for the glow); -green-deep mirrors
         --highlight-deep (the border + the button fill). */
      --highlight-green: #e9f6da;
      --highlight-green-deep: #bfe3a6;
      --link: #0066cc;
      --link-hover: #003f80;

      /* The nav bar and the deck canvas both take the page background
         (--base), so the whole reader is one continuous surface. */
      --chrome: var(--base);
      --tab-text: #585858;
      /* The dropdown darkens a touch when pressed/open. */
      --press: rgba(0, 0, 0, 0.06);

      --ease: cubic-bezier(0.2, 0.7, 0.2, 1);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --text-default: #f2efe9;
        --text-soft: #d3cfc6;
        --text-light: #8f8a82;
        --base: #1c1b19;
        --surface: #262522;
        --rule: rgba(255, 255, 255, 0.1);
        --highlight: #4a3a16;
        --highlight-deep: #6b5520;
        --highlight-green: #313f1c;
        --highlight-green-deep: #4a7d2c;
        --link: #7cc4ff;
        --link-hover: #b3dcff;

        --chrome: var(--base);
        --tab-text: #9a958d;
        --press: rgba(255, 255, 255, 0.08);
      }
    }

    *, *::before, *::after { box-sizing: border-box; }

    html, body { height: 100%; }

    html { -webkit-text-size-adjust: 100%; }

    body {
      margin: 0;
      background: var(--base);
      color: var(--text-default);
      font-family: var(--font-sans);
      font-size: 17px;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      overflow: hidden; /* the iframe scrolls, not the shell */
    }

    a {
      color: var(--link);
      text-decoration: none;
    }
    a:hover { color: var(--link-hover); text-decoration: underline; }

    :focus-visible {
      outline: 2px solid var(--link);
      outline-offset: 2px;
      border-radius: 3px;
    }

    /* ---------- app shell ---------- */

    .app {
      display: flex;
      flex-direction: column;
      height: 100svh;
    }
    /* Without this, `display:flex` overrides the `hidden` attribute, so the
       app (and its `authpill` dropdown) renders behind the gate — which
       duplicates the view-transition-name and breaks the unlock morph. */
    .app[hidden] { display: none; }

    /* ---------- chrome: tab strip ---------- */

    #chrome {
      position: relative;
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: center; /* tabs centered in the bar */
      /* Symmetric gutters reserve room for the absolutely-positioned back
         button on the left and keep the centered tabs from running under it
         on narrow screens. */
      padding: 0.55rem 2.85rem;
      padding-top: max(0.55rem, env(safe-area-inset-top));
      background: var(--chrome);
    }

    /* Toolbar icon buttons, pinned to the bar edges so they don't offset
       the centered dropdown: home on the left, fullscreen + rail toggle on
       the right (fullscreen sits just inboard of the navigator toggle). */
    .back, .rail-toggle, .fullscreen-toggle {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 2rem;
      height: 2rem;
      padding: 0;
      color: var(--tab-text);
      background: transparent;
      border: none;
      border-radius: 999px;
      cursor: pointer;
    }
    .back { left: 0.6rem; }
    .rail-toggle { right: 0.6rem; }
    .fullscreen-toggle { right: 3rem; }
    .back:hover, .rail-toggle:hover, .fullscreen-toggle:hover {
      color: var(--text-default);
      background: var(--press);
      text-decoration: none;
    }
    .rail-toggle[aria-pressed="true"] { color: var(--text-default); }
    .back svg, .rail-toggle svg { width: 18px; height: 18px; }
    /* The maximize glyph is sparser than the navigator's solid square, so it
       reads bigger and lighter at a matched box. Nudge it down a touch and
       thicken the stroke so the two icons carry equal weight. */
    .fullscreen-toggle svg { width: 16px; height: 16px; stroke-width: 2.4; }
    /* Cross-swap the maximize/minimize glyph with the fullscreen state. */
    .fullscreen-toggle .ic-collapse { display: none; }
    .fullscreen-toggle[aria-pressed="true"] .ic-expand { display: none; }
    .fullscreen-toggle[aria-pressed="true"] .ic-collapse { display: block; }
    /* The persistent fullscreen control is desktop-only; on phones the deck's
       own fullscreen toggle covers it and the top bar gets tight. 640px
       matches MOBILE_BP. */
    @media (max-width: 640px) { .fullscreen-toggle { display: none; } }

    /* A single minimal dropdown, centered in the bar — quieter than a tab
       strip inside a browser that already has tabs. The native <select>
       provides the system menu for the options; the closed control has no
       chrome of its own, just the current title and a caret. `authpill` is
       the shared element the passphrase input morphs into. */
    .picker {
      position: relative;
      display: inline-flex;
      align-items: center;
      max-width: 100%;
      view-transition-name: authpill;
    }
    .case_select {
      appearance: none;
      -webkit-appearance: none;
      max-width: 100%;
      margin: 0;
      padding: 0.35rem 1.15rem 0.35rem 0.7rem; /* room for the caret */
      border: none;
      border-radius: 8px;
      background: transparent;
      color: var(--text-default);
      font: inherit;
      font-size: 0.9rem;
      font-weight: 500;
      line-height: 1.2;
      text-overflow: ellipsis;
      cursor: pointer;
      transition: background 140ms var(--ease);
    }
    /* Quietly darker on hover and while pressed/open; default has no chrome. */
    .case_select:hover,
    .case_select:active { background: var(--press); }
    /* No focus ring by default — selects light up :focus-visible even on a
       mouse click in some engines. Show the ring only while the user is
       actually navigating by keyboard (body.-kbd, set on Tab). */
    .case_select:focus { outline: none; }
    body.-kbd .case_select:focus { outline: 2px solid var(--link); outline-offset: 1px; }

    .picker_caret {
      position: absolute;
      right: 0.28rem;
      width: 13px;
      height: 13px;
      color: var(--tab-text);
      pointer-events: none;
    }

    /* ---------- stage: iframe stack ---------- */

    #stage {
      position: relative;
      flex: 1 1 auto;
      background: var(--chrome); /* matches the deck canvas before load */
    }

    /* Frames toggle via visibility (no opacity crossfade, which used to
       flash the background between them). When switching works, the swap is
       wrapped in a View Transition so the content crossfades smoothly. */
    .frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      visibility: hidden;
      /* Canvas colour until the export paints, so a freshly-revealed frame
         never flashes white (most visible in dark mode) during the unlock. */
      background: var(--base);
    }
    .frame.-active {
      visibility: visible;
    }
    /* First reveal fades the deck in over the page-coloured stage (a plain
       snap read as a flash). Switching between cases keeps using the View
       Transition crossfade, so this one-shot animation is only added to the
       very first frame shown (see activate(..., fade)). */
    @keyframes frame-fade-in { from { opacity: 0; } to { opacity: 1; } }
    .frame.-fade-in { animation: frame-fade-in 360ms var(--ease) both; }
    @media (prefers-reduced-motion: reduce) {
      .frame.-fade-in { animation: none; }
    }

    /* ---------- password gate ---------- */

    #gate {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: grid;
      place-items: center;
      padding: var(--gutter, 1.5rem);
      background: var(--base);
    }
    #gate[hidden] { display: none; }

    .gate_card {
      width: min(26rem, 100%);
      text-align: center;
    }

    /* `authpill` is the shared element: on a correct passphrase this pill
       morphs into the tab bar via a View Transition. */
    .gate_field {
      position: relative;
      view-transition-name: authpill;
    }
    .gate_field input {
      width: 100%;
      /* right padding leaves room for the nested submit button */
      padding: 0.85rem 3.4rem 0.85rem 1.25rem;
      font: inherit;
      font-size: 1rem;
      color: var(--text-default);
      background: var(--surface);
      border: 1px solid var(--rule);
      border-radius: 999px; /* pill */
      transition: border-color 140ms var(--ease), box-shadow 140ms var(--ease);
    }
    .gate_field input::placeholder { color: var(--text-light); }
    .gate_field input:focus {
      outline: none;
      border-color: var(--highlight-deep);
      box-shadow: 0 0 0 3px var(--highlight);
    }
    /* Once the passphrase is correct, the input's focus glow goes green to
       match the success button. */
    .gate_field:has(.gate_submit.-ready) input:focus {
      border-color: var(--highlight-green-deep);
      box-shadow: 0 0 0 3px var(--highlight-green);
    }

    .gate_submit {
      position: absolute;
      top: 50%;
      right: 0.4rem;
      transform: translateY(-50%);
      display: grid;
      place-items: center;
      width: 2.2rem;
      height: 2.2rem;
      padding: 0;
      color: var(--text-default);
      background: var(--highlight-deep);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      /* Ease the gold->green fill so the success state arrives, not flashes. */
      transition: background 220ms var(--ease), filter 140ms var(--ease);
    }
    .gate_submit:hover { filter: brightness(0.94); }

    /* The arrow and the hotdog share one grid cell so they cross-fade in
       place: the arrow eases out as the dog pops in, with no empty-circle
       flash in between. */
    .gate_submit_arrow,
    .gate_submit_dog {
      grid-area: 1 / 1;
      transition: opacity 180ms var(--ease), transform 180ms var(--ease);
    }
    .gate_submit_arrow { width: 1.05rem; height: 1.05rem; }
    .gate_submit_dog {
      font-size: 1.15rem;
      line-height: 1;
      opacity: 0;
      transform: scale(0.4);
    }
    /* Once the typed passphrase is correct, the arrow gives way to a hotdog
       that pops in — a playful "you got it" before they even hit enter. */
    .gate_submit.-ready { background: var(--highlight-green-deep); }
    .gate_submit.-ready .gate_submit_arrow { opacity: 0; transform: scale(0.4); }
    .gate_submit.-ready .gate_submit_dog {
      opacity: 1;
      transform: none;
      animation: dogpop 0.42s var(--ease);
    }
    @keyframes dogpop {
      0%   { transform: scale(0) rotate(-30deg); opacity: 0; }
      55%  { transform: scale(1.35) rotate(8deg); opacity: 1; }
      75%  { transform: scale(0.9) rotate(-5deg); }
      100% { transform: scale(1) rotate(0); }
    }
    @media (prefers-reduced-motion: reduce) {
      .gate_submit_arrow,
      .gate_submit_dog { transition: none; }
      .gate_submit.-ready .gate_submit_dog { animation: none; }
    }

    .gate_form { position: relative; }
    /* The error sits just above the input, positioned absolutely so showing
       or hiding it never reflows the layout. */
    p.gate_error {
      position: absolute;
      left: 0;
      right: 0;
      bottom: calc(100% + 0.5rem);
      margin: 0;
      font-size: 0.85rem;
      color: #c0392b;
    }
    @media (prefers-color-scheme: dark) {
      p.gate_error { color: #ff8a7a; }
    }
    .gate_error[hidden] { display: block; visibility: hidden; }

    /* The input pill shakes on a wrong passphrase. */
    .gate_field.-wrong { animation: shake 0.4s var(--ease); }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-5px); }
      40%, 80% { transform: translateX(5px); }
    }
    @media (prefers-reduced-motion: reduce) {
      .gate_field.-wrong { animation: none; }
    }

    /* Keep the unlock buttery: the pill->tab-bar morph and the whole-page
       crossfade share one duration and the site easing, so neither races
       ahead of the other into a flash. */
    ::view-transition-group(authpill),
    ::view-transition-group(root),
    ::view-transition-old(root),
    ::view-transition-new(root) {
      animation-duration: 360ms;
      animation-timing-function: var(--ease);
    }

    .gate_help {
      margin: 1.4rem auto 0;
      max-width: 22rem;
      font-size: 0.85rem;
      line-height: 1.5;
      color: var(--text-soft);
    }
    .gate_help a { text-decoration: underline; text-underline-offset: 0.15em; }

    .gate_back {
      margin-top: 1.1rem;
      font-size: 0.85rem;
      color: var(--text-light);
    }

    /* No-JS: the gate can't run, so explain rather than show a dead form. */
    .noscript {
      max-width: 26rem;
      margin: 4rem auto;
      padding: 0 1.5rem;
      text-align: center;
      color: var(--text-soft);
    }
  </style>
</head>

<body>
  <noscript>
    <p class="noscript">
      These case studies need JavaScript to view.
      <a href="../">Return to zacharyhalvorson.com</a>.
    </p>
  </noscript>

  <!-- Password gate ------------------------------------------------- -->
  <div id="gate" hidden>
    <div class="gate_card">
      <form class="gate_form" id="gate-form" autocomplete="off">
        <p class="gate_error" id="gate-error" role="alert" hidden>Try again.</p>
        <div class="gate_field">
          <input
            type="text"
            id="gate-input"
            name="passphrase"
            placeholder="Enter passphrase"
            aria-label="Passphrase"
            autocapitalize="off"
            autocorrect="off"
            spellcheck="false">
          <button type="submit" class="gate_submit" aria-label="Enter">
            <svg class="gate_submit_arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M5 12h14"></path>
              <path d="M13 6l6 6-6 6"></path>
            </svg>
            <span class="gate_submit_dog" aria-hidden="true">&#x1F32D;</span>
          </button>
        </div>
      </form>
      <p class="gate_help">
        Need access, or having trouble with your passphrase? Email
        <a href="mailto:zacharyhalvorson@me.com?subject=Case%20study%20access">zacharyhalvorson@me.com</a>
        and I&rsquo;ll get you in.
      </p>
      <p class="gate_back"><a href="../">&larr; Back to zacharyhalvorson.com</a></p>
    </div>
  </div>

  <!-- App shell ----------------------------------------------------- -->
  <div class="app" id="app" hidden>
    <header id="chrome">
      <a class="back" href="../" aria-label="Back to zacharyhalvorson.com">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
          <path d="M9 22V12h6v10"></path>
        </svg>
      </a>
      <div class="picker">
        <select class="case_select" id="case-select" aria-label="Case study"></select>
        <svg class="picker_caret" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M6 9l6 6 6-6"></path>
        </svg>
      </div>
      <button class="fullscreen-toggle" id="fullscreen-toggle" type="button" aria-pressed="false" aria-label="Toggle fullscreen" title="Toggle fullscreen" hidden>
        <svg class="ic-expand" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M8 3H5a2 2 0 0 0-2 2v3"></path>
          <path d="M21 8V5a2 2 0 0 0-2-2h-3"></path>
          <path d="M3 16v3a2 2 0 0 0 2 2h3"></path>
          <path d="M16 21h3a2 2 0 0 0 2-2v-3"></path>
        </svg>
        <svg class="ic-collapse" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M8 3v3a2 2 0 0 1-2 2H3"></path>
          <path d="M21 8h-3a2 2 0 0 1-2-2V3"></path>
          <path d="M3 16h3a2 2 0 0 1 2 2v3"></path>
          <path d="M16 21v-3a2 2 0 0 1 2-2h3"></path>
        </svg>
      </button>
      <button class="rail-toggle" id="rail-toggle" type="button" aria-pressed="true" aria-label="Toggle slide navigator">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="3" width="18" height="18" rx="2"></rect>
          <path d="M9 3v18"></path>
        </svg>
      </button>
    </header>
    <main id="stage" aria-label="Case study"></main>
  </div>

  <script>
  (function () {
    "use strict";

    /* -------------------------------------------------------------
       Case-study manifest. To publish or update a case study:
         1. Drop its export at  work/<slug>/index.html
         2. Optimize its videos for fast loading (re-run after EVERY
            re-export — a fresh export resets the <video> tags):
              node work/optimize-deck.mjs <slug>
         3. Add one line here.  Order = tab order; the first entry is
            the default tab a visitor lands on.
       See work/README.md for the full workflow.
       ------------------------------------------------------------- */
    var CASES = [
      { slug: "rayban-meta",    label: "Livestreaming & POV calling", src: "rayban-meta/" },
      { slug: "rayban-display", label: "Meta Ray-Ban Display",         src: "rayban-display/" }
    ];

    /* SHA-256 of the passphrase. Client-side gate only — a deterrent,
       not real security. */
    var PASS_HASH = "798147886b5d89368a69437e162aa859d0e3569579576c099d3f1ac8a75e8b55";
    var UNLOCK_KEY = "work-unlocked-v1";

    /* A shareable link that skips the passphrase entirely:
       /work#hotdogs-from-heaven. Arriving with this fragment unlocks just
       like a correct entry and persists the unlock (below), so the link is
       only ever needed once. Same deterrent-not-security caveat applies. */
    var BYPASS_HASH = "hotdogs-from-heaven";

    // Phones: the deck hides its own rail at this width (its internal
    // `@media (max-width:640px)`), so the shell must stop reserving the rail's
    // column too. Kept in sync with that breakpoint.
    var MOBILE_BP = 640;

    /* Styles injected into each export to theme the slide-PLAYER chrome,
       not the slides. Injected from the parent (same-origin) because the
       bundler rebuilds the document and wipes anything shipped inside it.
       Document-level: the deck canvas takes the page background, the main
       slide gets a soft drop shadow so it floats on the canvas, and
       `--deck-rail-w` (the host var the deck uses to offset its stage) is
       widened to clear the floated rail / zeroed when it's hidden. */
    var DECK_CSS =
      "html,body{background:#fafaf7 !important}" +
      "deck-stage{background:#fafaf7 !important}" +
      ".slide{box-shadow:0 10px 34px rgba(0,0,0,0.12) !important;" +
      "transition:transform 360ms cubic-bezier(0.2,0.7,0.2,1) !important}" +
      // When the rail is hidden, scale the slide up to fill the freed space
      // (the deck scales a parent, not .slide itself, so this composes and
      // stays crisp). `--fill-scale` is computed in JS from the deck width.
      "deck-stage.rail-off .slide{transform:scale(var(--fill-scale,1)) !important;" +
      "transform-origin:center !important}" +
      // In fullscreen the deck fits the canvas to the full screen itself, so the
      // rail-off fill-scale (computed for the embedded width) would over-scale
      // the slide and overflow. Drop it while data-fs is set.
      "deck-stage[data-fs] .slide{transform:none !important}" +
      "@media (prefers-color-scheme:dark){" +
      "html,body{background:#1c1b19 !important}" +
      "deck-stage{background:#1c1b19 !important}" +
      ".slide{box-shadow:0 12px 40px rgba(0,0,0,0.55) !important}}";

    // Shadow-root level: float the deck's slide navigator (`.rail`) like
    // Keynote — inset, rounded, a translucent tint slightly darker than the
    // canvas behind it. The deck positions its stage with an inline `left`, so
    // we override the stage's left/width directly. Toggling `.rail-off` on the host slides the
    // rail off-screen and expands the stage to full width — the deck
    // re-centers the slide into the freed space — both transitioned.
    // Injected into deck-stage's (open) shadow root; document CSS can't reach it.
    var EASE = "cubic-bezier(0.2,0.7,0.2,1)";
    // The deck bakes each thumbnail's scale for a rail of --deck-rail-w wide.
    // Match that width or the previews render larger than the frame and crop
    // on the right/bottom. Tracking the var keeps them fitted across exports.
    var RAIL_W = "var(--deck-rail-w, 188px)";
    var STAGE_LEFT = "calc(9px + " + RAIL_W + " + 18px)"; // clears the floated rail (left + width + gap)
    var STAGE_RIGHT = 18; // mirror the 18px rail->stage gap on the left, so the slide sits with equal margins instead of hugging the window's right edge
    var RAIL_CSS =
      ".rail{top:14px !important;bottom:14px !important;left:9px !important;" +
      "height:auto !important;width:" + RAIL_W + " !important;border:none !important;" +
      "border-radius:16px !important;padding:10px !important;" +
      "background:rgba(0,0,0,0.06) !important;" +
      "box-shadow:0 4px 18px rgba(0,0,0,0.08) !important;" +
      "visibility:visible !important;" +
      // Transform-only (no opacity fade) so the slide-in/out stays fluid.
      "transition:transform 360ms " + EASE + " !important}" +
      // Keep thumbnails at their natural height (the deck already rounds the

      // (default hidden; toggled open). setupRail keeps the rail laid out so the

      ".overlay .divider:has(+ .fullscreen){display:none !important}}" +
      "@media (max-width:" + MOBILE_BP + "px) and (prefers-color-scheme:dark){" +

        opt.textContent = c.label;

        frame.className = "frame";
        frame.id = "frame-" + c.slug;

        // requestFullscreen() on an element *inside* the iframe; the Fullscreen

      // switch (hovering or focusing the picker), so a prefetch that's still
      // waiting on idle time — or was skipped on a slow/Data-Saver connection

      // loadFrame is a no-op once its frame is loading or loaded.

    // load is handled separately so we never reveal a blank iframe.
    function activate(slug, fade) {

      selectEl.value = slug;

        f.classList.toggle("-active", on);

        // instead). Restart the animation cleanly if a frame is reused.

      // frame. Hand focus to the live deck on load and on every case switch so
      // arrow / Page / Space / Home-End work immediately — without this the

      try { frames[slug].focus({ preventScroll: true }); } catch (e) {}

    // cases so later switches are instant.

    // later switch is instant — but politely. The other export is a ~23 MB
    // inlined file; pulling it the instant the first deck finishes loading
    // makes it fight the deck the visitor is actually reading for bandwidth
    // (slowing the first slide's media + reveal), and burns data on a case
    // they may never open. So defer the prefetch to idle time, and skip it
    // under Data Saver or on a 2g-class connection. Switching still works

          var themedRoot = ds && ds.shadowRoot &&

    function selectCase(slug) {

          });

    }

    function labelFor(slug) {

    // slide and pause the rest, so a clip's bytes are only pulled once its
    // slide is actually shown (and stay buffered after, for instant revisits).
    // Driven off the deck's own `data-deck-active` marker via a MutationObserver

    // surprise just no-ops (videos then simply rest on their posters).

      // rail is shown, so there's no freed space to grow into — keep scale 1.
      // Keyed on viewport (like every other breakpoint check + the CSS @media).
      if (window.innerWidth <= MOBILE_BP) return 1;

      // already fills — scaling it up here would overflow the viewport.

    }

    // One-time setup for a deck's slide-navigator rail (runs when RAIL_CSS is

    function setupRail(frame, ds) {
      try {
        var win = frame.contentWindow;
        var rail = ds.shadowRoot && ds.shadowRoot.querySelector(".rail");
        if (!rail || ds.dataset.railSetup) return; // once per deck, even if re-themed

        // 1) Thumbnail sizing. The deck clones + sizes its thumbnails to the
        //    rail exactly as on desktop, but skips that work whenever the rail
        //    has no layout — which it withholds below 640px. RAIL_CSS keeps the
        //    rail laid out (it just floats off-screen as a drawer), so the
        //    clones materialize; poke the deck's own resize path when the rail's
        //    WIDTH settles (initial layout, scrollbar appearing) so it sizes

        //    already handles natively, so reacting to them would just double its
        //    work on every resize.

            lastW = w;
            try { win.dispatchEvent(new win.Event("resize")); } catch (e) {}

        }

        // 2) Read-only. The deck makes thumbnails draggable to reorder and
        //    right-clickable to skip/delete — authoring affordances that don't
        //    belong in the portfolio reader, where the order is fixed. Cancel
        //    both. Capturing, so it covers thumbs the deck re-creates on every
        //    render without re-binding.
        rail.addEventListener("dragstart", function (e) { e.preventDefault(); }, true);
        rail.addEventListener("contextmenu", function (e) {
          e.preventDefault();
          e.stopPropagation();
        }, true);

        // 3) Tap-off to dismiss (phones only, where the rail is a drawer over
        //    the slide). A tap outside the rail closes it and is consumed, so
        //    the deck doesn't also navigate on that tap. Capturing on the host,
        //    ahead of the deck's own tap handler.
        ds.addEventListener("click", function (e) {
          if (railHidden || window.innerWidth > MOBILE_BP) return;
          if (rail && e.composedPath().indexOf(rail) !== -1) return; // inside the drawer
          e.preventDefault();
          e.stopImmediatePropagation();
          setRailHidden(true);
        }, true);
      } catch (e) { /* cross-origin / not ready */ }
    }

    // Reflect the current navigator state onto one deck (fill scale + rail-off).
    function applyRailToDeck(ds) {
      ds.style.setProperty("--fill-scale", fillScaleFor(ds).toFixed(4));
      ds.classList.toggle("rail-off", railHidden);
    }

    // Apply the navigator state across all loaded decks.
    function applyRailState() {
      Object.keys(frames).forEach(function (slug) {
        try {
          var doc = frames[slug].contentDocument;
          var ds = doc && doc.querySelector("deck-stage");
          if (ds) applyRailToDeck(ds);
        } catch (e) { /* cross-origin / not ready */ }
      });
    }

    // Set navigator visibility from the toggle button and the tap-off dismiss.
    // (The resize handler sets railHidden directly on a breakpoint crossing so
    // it can share the single rAF-coalesced applyRailState below.)
    function setRailHidden(hidden) {
      railHidden = hidden;
      railToggle.setAttribute("aria-pressed", String(!railHidden));
      applyRailState();
    }

    // Reflect the initial visibility (hidden by default on phones).
    railToggle.setAttribute("aria-pressed", String(!railHidden));

    railToggle.addEventListener("click", function () { setRailHidden(!railHidden); });

    // Persistent fullscreen toggle in the top row. (The deck ships its own
    // fullscreen control, but only inside its auto-hiding bottom nav.) This
    // fullscreens the whole reader so the chrome, and this button, stay
    // reachable to toggle back out; the active deck refits to the larger
    // canvas on the resize. Revealed only where the Fullscreen API is usable,
    // otherwise it stays hidden rather than presenting a dead control.
    var fsToggle = document.getElementById("fullscreen-toggle");
    if (fsToggle && (document.fullscreenEnabled || document.webkitFullscreenEnabled)) {
      fsToggle.hidden = false;
      var fsRoot = document.documentElement;
      // True only when WE put the reader in fullscreen. The deck's own control
      // fullscreens an element inside the iframe, which surfaces here as the
      // <iframe> being document.fullscreenElement; matching on our own root
      // keeps the two controls from flipping each other's pressed state.
      var fsActive = function () {
        return (document.fullscreenElement || document.webkitFullscreenElement) === fsRoot;
      };
      var syncFs = function () {
        fsToggle.setAttribute("aria-pressed", fsActive() ? "true" : "false");
      };
      fsToggle.addEventListener("click", function () {
        try {
          var p = fsActive()
            ? (document.exitFullscreen || document.webkitExitFullscreen).call(document)
            : (fsRoot.requestFullscreen || fsRoot.webkitRequestFullscreen).call(fsRoot);
          // The request/exit promise rejects asynchronously when the gesture
          // is untrusted or blocked by policy; swallow it like the sync guard.
          if (p && p.catch) p.catch(function () {});
        } catch (e) { /* fullscreen unavailable, ignore */ }
      });
      document.addEventListener("fullscreenchange", syncFs);
      document.addEventListener("webkitfullscreenchange", syncFs);
      syncFs();
    }

    // Keep layout accurate as the viewport changes. Crossing the phone
    // breakpoint resets the navigator to that mode's default (the two modes
    // have opposite defaults). rAF-coalesced so a drag- or URL-bar resize
    // doesn't thrash layout across the iframes.
    var wasNarrow = window.innerWidth <= MOBILE_BP;
    var resizeQueued = false;
    window.addEventListener("resize", function () {
      var nowNarrow = window.innerWidth <= MOBILE_BP;
      if (nowNarrow !== wasNarrow) {
        wasNarrow = nowNarrow;
        railHidden = nowNarrow;
        railToggle.setAttribute("aria-pressed", String(!railHidden));
      }
      if (resizeQueued) return;
      resizeQueued = true;
      requestAnimationFrame(function () { resizeQueued = false; applyRailState(); });
    });

    // Focus rings only while navigating by keyboard.
    window.addEventListener("keydown", function (e) {
      if (e.key === "Tab") document.body.classList.add("-kbd");
    });
    window.addEventListener("pointerdown", function () {
      document.body.classList.remove("-kbd");
    });

    // activate() hands focus to the deck, but focus can drift back to the
    // shell chrome (clicking the home or sidebar button, the dropdown). When
    // it has, forward the export's navigation keys to the active case so they
    // keep working without re-clicking the slide. Re-dispatch into the iframe
    // so the first press counts, then hand focus over for subsequent keys.
    var DECK_NAV_KEYS = {
      ArrowLeft: 1, ArrowRight: 1, ArrowUp: 1, ArrowDown: 1, PageUp: 1,
      PageDown: 1, Home: 1, End: 1, " ": 1, Spacebar: 1
    };
    window.addEventListener("keydown", function (e) {
      if (e.defaultPrevented || e.metaKey || e.ctrlKey || e.altKey) return;
      if (!DECK_NAV_KEYS[e.key]) return;
      var ae = document.activeElement;
      if (ae) {
        var tag = ae.tagName;
        // Leave focused controls alone: the case dropdown, gate input, links.
        if (ae === selectEl || ae.isContentEditable ||
            tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT" ||
            tag === "BUTTON" || tag === "A") return;
      }
      var frame = active && frames[active];
      if (!frame || !frame.contentWindow || ae === frame) return;
      try {
        frame.contentWindow.dispatchEvent(
          new KeyboardEvent("keydown", { key: e.key, code: e.code })
        );
        frame.focus({ preventScroll: true });
        e.preventDefault();
      } catch (err) {}
    });

    function defaultSlug() {
      var hash = location.hash.replace(/^#/, "");
      if (hash && frames[hash]) return hash;
      return CASES[0] && CASES[0].slug;
    }

    /* ----- unlock flow ----- */
    function reveal() {
      gate.hidden = true;
      app.hidden = false;
      if (!Object.keys(frames).length) buildCases();
      var slug = defaultSlug();
      if (slug) {
        pendingSlug = slug;
        // Reflect the case in the chrome right away, but keep the frame hidden
        // (showing just the page-coloured stage) until its canvas is themed, so
        // the deck's dark default body never flashes through on first paint.
        selectEl.value = slug;
        fitSelect();
        document.title = labelFor(slug) + " — Zachary Halvorson";
        if (history.replaceState) history.replaceState(null, "", "#" + slug);
        loadFrame(slug, function () {
          if (pendingSlug !== slug) return;
          whenThemed(frames[slug], function () {
            if (pendingSlug !== slug) return;
            activate(slug, true); // fade the first deck in
          });
        });
      }
      // Deliberately don't move focus to the dropdown — that would show its
      // focus ring on a plain click-unlock; the ring is for keyboard users.
    }

    function showGate() {
      app.hidden = true;
      gate.hidden = false;
      gateInput.focus();
    }

    function wrong() {
      gateError.hidden = false;
      gateField.classList.remove("-wrong");
      // reflow to restart the shake animation
      void gateField.offsetWidth;
      gateField.classList.add("-wrong");
      gateInput.select();
    }

    // On a correct passphrase, morph the input pill into the dropdown with a
    // View Transition (the shared `authpill` element).
    function unlock() {
      withTransition(function () { reveal(); });
    }

    gateForm.addEventListener("submit", function (e) {
      e.preventDefault();
      var value = gateInput.value.trim().toLowerCase();
      if (!value) { wrong(); return; }
      sha256Hex(value).then(function (hex) {
        if (hex === PASS_HASH) {
          try { localStorage.setItem(UNLOCK_KEY, "1"); } catch (_) {}
          unlock();
        } else {
          wrong();
        }
      });
    });

    // Swap the arrow for a popping hotdog the instant the typed passphrase
    // is correct — a little "you got it" tell before they submit. Hashing is
    // async, so ignore a result if the field changed while it was computing.
    function refreshDog() {
      var value = gateInput.value.trim().toLowerCase();
      if (!value) { gateSubmit.classList.remove("-ready"); return; }
      sha256Hex(value).then(function (hex) {
        if (gateInput.value.trim().toLowerCase() !== value) return;
        gateSubmit.classList.toggle("-ready", hex === PASS_HASH);
      });
    }

    gateInput.addEventListener("input", function () {
      if (!gateError.hidden) gateError.hidden = true;
      refreshDog();
    });

    // Already unlocked on this device, or arriving via the shareable bypass
    // link (/work#hotdogs-from-heaven)? Skip the gate. localStorage persists
    // the unlock across navigations, tabs, and return visits, so the
    // passphrase (or the link) is only ever needed once.
    var unlocked = false;
    try { unlocked = localStorage.getItem(UNLOCK_KEY) === "1"; } catch (_) {}
    if (location.hash.replace(/^#/, "").toLowerCase() === BYPASS_HASH) {
      try { localStorage.setItem(UNLOCK_KEY, "1"); } catch (_) {}
      unlocked = true;
    }
    if (unlocked) {
      reveal();
    } else {
      showGate();
    }
  })();
  </script>
</body>
</html>
